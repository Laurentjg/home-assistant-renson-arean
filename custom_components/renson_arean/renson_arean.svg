<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img">
  <title>Renson Arean warmtepomp</title>
  <desc>Home Assistant integratie icon voor de Renson Arean warmtepomp</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7eb3f5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Achtergrond -->
  <rect width="240" height="240" rx="28" fill="#143d8d"/>

  <!-- Buitenunit box -->
  <rect x="22" y="32" width="68" height="116" rx="9" fill="#ffffff" fill-opacity="0.13"/>
  <!-- Rooster lijntjes -->
  <line x1="22" y1="50"  x2="90" y2="50"  stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.3"/>
  <line x1="22" y1="64"  x2="90" y2="64"  stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.3"/>
  <line x1="22" y1="78"  x2="90" y2="78"  stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.3"/>
  <line x1="22" y1="92"  x2="90" y2="92"  stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.3"/>
  <line x1="22" y1="106" x2="90" y2="106" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.3"/>
  <line x1="22" y1="120" x2="90" y2="120" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.3"/>

  <!-- Ventilator cirkel -->
  <circle cx="56" cy="90" r="38" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-opacity="0.75"/>
  <circle cx="56" cy="90" r="10" fill="#ffffff" fill-opacity="0.28"/>
  <!-- 4 bladen -->
  <path d="M56 52 Q69 70 56 79 Q43 70 56 52Z"   fill="#ffffff" fill-opacity="0.65"/>
  <path d="M94 90 Q76 103 68 90 Q76 77 94 90Z"   fill="#ffffff" fill-opacity="0.65"/>
  <path d="M56 128 Q43 110 56 101 Q69 110 56 128Z" fill="#ffffff" fill-opacity="0.65"/>
  <path d="M18 90 Q36 77 44 90 Q36 103 18 90Z"   fill="#ffffff" fill-opacity="0.65"/>

  <!-- Warmtepijlen -->
  <path d="M100 60 Q114 76 100 92"  fill="none" stroke="#7eb3f5" stroke-width="2.6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M112 76 Q127 92 112 108" fill="none" stroke="#7eb3f5" stroke-width="2.1" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M100 94 Q114 110 100 126" fill="none" stroke="#7eb3f5" stroke-width="2.6" stroke-linecap="round" marker-end="url(#arrow)"/>

  <!-- Huisje rechtsonder -->
  <!-- Dak -->
  <polygon points="178,138 136,168 220,168" fill="#ffffff" fill-opacity="0.95"/>
  <!-- Schoorsteentje -->
  <rect x="196" y="144" width="8" height="16" rx="1" fill="#ffffff" fill-opacity="0.7"/>
  <!-- Muren -->
  <rect x="144" y="166" width="68" height="50" rx="3" fill="#ffffff" fill-opacity="0.95"/>
  <!-- Deur -->
  <rect x="169" y="184" width="18" height="32" rx="3" fill="#143d8d"/>
  <!-- Raam links -->
  <rect x="149" y="176" width="14" height="14" rx="2" fill="#7eb3f5" fill-opacity="0.7"/>
  <!-- Raam kruis -->
  <line x1="156" y1="176" x2="156" y2="190" stroke="#143d8d" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="149" y1="183" x2="163" y2="183" stroke="#143d8d" stroke-width="1" stroke-opacity="0.5"/>
